<!-- START THE HERD MENU WIDGET -->
<style>
#herd-menu-widget*{box-sizing:border-box;margin:0;padding:0}
#herd-menu-widget{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  background:#fff;border-radius:8px;overflow:hidden;max-width:780px;margin:0 auto
}
/* Logo header */
#herd-menu-widget .hmw-header{
  text-align:center;padding:24px 24px 16px;background:#fff;border-bottom:1px solid #dde5de
}
#herd-menu-widget .hmw-brand-img{display:block;width:180px;margin:0 auto}
/* Top-level menu tabs */
#herd-menu-widget .hmw-menus{
  display:flex;overflow-x:auto;background:#fff;
  border-bottom:2px solid #dde5de;scrollbar-width:none;-ms-overflow-style:none
}
#herd-menu-widget .hmw-menus::-webkit-scrollbar{display:none}
#herd-menu-widget .hmw-menu-tab{
  flex-shrink:0;padding:11px 18px;font-size:11px;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;color:#6b7c6d;cursor:pointer;
  border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:color .15s,border-color .15s;white-space:nowrap;
  font-family:'Courier New',Courier,monospace
}
#herd-menu-widget .hmw-menu-tab:hover{color:#2F5233}
#herd-menu-widget .hmw-menu-tab.active{color:#2F5233;border-bottom-color:#2F5233}
/* Menu panels */
#herd-menu-widget .hmw-menu-panel{display:none}
#herd-menu-widget .hmw-menu-panel.active{display:block;animation:hmwFade .18s ease}
@keyframes hmwFade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
/* Panel tagline */
#herd-menu-widget .hmw-tagline{
  font-size:12px;color:#666;line-height:1.65;font-style:italic;
  padding:14px 24px 0;text-align:center
}
/* Section */
#herd-menu-widget .hmw-content{padding:18px 24px}
#herd-menu-widget .hmw-section{margin-bottom:20px}
#herd-menu-widget .hmw-section-name{
  font-family:'Courier New',Courier,monospace;font-size:14px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;color:#1a1a1a;
  padding-bottom:6px;border-bottom:1px solid #c8d8c9;margin-bottom:8px
}
#herd-menu-widget .hmw-section-subtitle{
  font-size:12px;color:#888;font-style:italic;margin:-2px 0 8px
}
/* Items */
#herd-menu-widget .hmw-item{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 0;border-bottom:1px solid #eef2ef;gap:12px
}
#herd-menu-widget .hmw-item:last-child{border-bottom:none}
#herd-menu-widget .hmw-item-left{flex:1;min-width:0}
#herd-menu-widget .hmw-item-name{font-size:13px;color:#1a1a1a;font-weight:400;line-height:1.4}
#herd-menu-widget .hmw-item-desc{font-size:11px;color:#888;font-style:italic;margin-top:2px}
#herd-menu-widget .hmw-item-price{font-size:13px;color:#2F5233;font-weight:500;white-space:nowrap;flex-shrink:0}
/* Footer */
#herd-menu-widget .hmw-footer{
  padding:14px 24px;background:#fff;border-top:1px solid #dde5de;
  font-size:10.5px;color:#888;text-align:center;line-height:1.6;font-style:italic
}
@media(max-width:520px){
  #herd-menu-widget .hmw-brand-img{width:140px}
  #herd-menu-widget .hmw-content{padding:14px 16px}
  #herd-menu-widget .hmw-tagline{padding:12px 16px 0}
  #herd-menu-widget .hmw-menu-tab{padding:10px 13px;font-size:10px}
  #herd-menu-widget .hmw-footer{padding:12px 16px}
}
</style>
<div id="herd-menu-widget">
<script>(function(){
var MENUS=__MENUS_DATA__;
if(!MENUS||!MENUS.length)return;
function fmt(p){var n=parseFloat(p);if(!n)return'';return'£'+(n%1===0?n:n.toFixed(2));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
/* Apply body font from global settings (same across all menus) */
var bodyFont=MENUS[0].meta&&MENUS[0].meta.bodyFont;
if(bodyFont)document.getElementById('herd-menu-widget').style.fontFamily=bodyFont;
function renderSection(s){
  var h='<div class="hmw-section">';
  h+='<div class="hmw-section-name">'+esc(s.name)+'</div>';
  if(s.subtitle)h+='<div class="hmw-section-subtitle">'+esc(s.subtitle)+'</div>';
  (s.items||[]).forEach(function(it){
    h+='<div class="hmw-item"><div class="hmw-item-left">';
    h+='<div class="hmw-item-name">'+esc(it.name)+'</div>';
    if(it.description)h+='<div class="hmw-item-desc">'+esc(it.description)+'</div>';
    h+='</div><div class="hmw-item-price">'+fmt(it.price)+'</div></div>';
  });
  h+='</div>';
  return h;
}
var w=document.getElementById('herd-menu-widget');
var h='';
/* Logo header — shared across all menus */
var logoUrl=MENUS[0].meta&&MENUS[0].meta.logoUrl;
if(logoUrl){
  h+='<div class="hmw-header"><img class="hmw-brand-img" src="'+esc(logoUrl)+'" alt="Herd at Todenham Manor Farm"></div>';
}
/* Menu-level tab bar */
h+='<div class="hmw-menus" role="tablist">';
MENUS.forEach(function(m,i){
  h+='<button class="hmw-menu-tab'+(i===0?' active':'')+'" role="tab" data-idx="'+i+'">'+esc(m.title)+'</button>';
});
h+='</div>';
/* One panel per menu — all sections visible at once, no sub-navigation */
MENUS.forEach(function(m,i){
  h+='<div class="hmw-menu-panel'+(i===0?' active':'')+'" id="hmw-mp-'+i+'">';
  if(m.meta&&m.meta.tagline)h+='<p class="hmw-tagline">'+esc(m.meta.tagline)+'</p>';
  h+='<div class="hmw-content">';
  (m.sections||[]).forEach(function(s){h+=renderSection(s);});
  h+='</div>';
  if(m.meta&&m.meta.footer)h+='<div class="hmw-footer">'+esc(m.meta.footer)+'</div>';
  h+='</div>';
});
w.innerHTML=h;
/* Tab switching */
w.querySelectorAll('.hmw-menu-tab').forEach(function(btn){
  btn.addEventListener('click',function(){
    w.querySelectorAll('.hmw-menu-tab').forEach(function(t){t.classList.remove('active');});
    w.querySelectorAll('.hmw-menu-panel').forEach(function(p){p.classList.remove('active');});
    btn.classList.add('active');
    var panel=w.querySelector('#hmw-mp-'+btn.dataset.idx);
    if(panel)panel.classList.add('active');
  });
});
})();</script>
</div>
<!-- END THE HERD MENU WIDGET -->
